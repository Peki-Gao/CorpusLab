<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66bb6a;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#fafbfc"/>

  <!-- Title -->
  <rect x="300" y="20" width="300" height="50" rx="12" fill="url(#titleGrad)" filter="url(#cardShadow)"/>
  <text x="450" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">12 大核心功能</text>

  <!-- Feature Cards - 4 columns x 3 rows -->
  <g id="features">
    <!-- Row 1 -->
    <rect x="40" y="90" width="190" height="110" rx="10" fill="#e3f2fd" stroke="#4a90e2" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="135" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">1. 语料管理</text>
    <text x="135" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">TXT/DOCX 加载</text>
    <text x="135" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">中英文自动检测</text>
    <text x="135" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">停用词过滤</text>

    <rect x="250" y="90" width="190" height="110" rx="10" fill="#fff8e1" stroke="#ffc107" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="345" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f57f17">2. 频率表</text>
    <text x="345" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">词频统计</text>
    <text x="345" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">POS+Lemma 频率</text>
    <text x="345" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">标签频率</text>

    <rect x="460" y="90" width="190" height="110" rx="10" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="555" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2e7d32">3. 关键词分析</text>
    <text x="555" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">Log-Likelihood</text>
    <text x="555" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">频率比</text>
    <text x="555" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">标签 Keyness</text>

    <rect x="670" y="90" width="190" height="110" rx="10" fill="#f3e5f5" stroke="#ab47bc" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="765" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6a1b9a">4. 索引行</text>
    <text x="765" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">多词共现检索</text>
    <text x="765" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">引号短语匹配</text>
    <text x="765" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">彩色高亮标记</text>

    <!-- Row 2 -->
    <rect x="40" y="220" width="190" height="110" rx="10" fill="#e1f5fe" stroke="#29b6f6" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="135" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#01579b">5. 搭配分析</text>
    <text x="135" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">MI / T-score / Dice</text>
    <text x="135" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">窗口 L1R1-L10R10</text>
    <text x="135" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">标签搭配模式</text>

    <rect x="250" y="220" width="190" height="110" rx="10" fill="#fce4ec" stroke="#ec407a" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="345" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#880e4f">6. 搭配网络</text>
    <text x="345" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">ECharts 力导向图</text>
    <text x="345" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">无限链式展开</text>
    <text x="345" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">黑白论文风格</text>

    <rect x="460" y="220" width="190" height="110" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="555" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e65100">7. 情感分析</text>
    <text x="555" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">DeepSeek API</text>
    <text x="555" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">Positive/Negative</text>
    <text x="555" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">score + keywords</text>

    <rect x="670" y="220" width="190" height="110" rx="10" fill="#e0f2f1" stroke="#26a69a" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="765" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00695c">8. SFL 标注</text>
    <text x="765" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">过程类型 / 参与者</text>
    <text x="765" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">环境 / 主位</text>
    <text x="765" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">DeepSeek API</text>

    <!-- Row 3 -->
    <rect x="40" y="350" width="190" height="110" rx="10" fill="#f3e5f5" stroke="#ab47bc" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="135" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6a1b9a">9. 语义学标注</text>
    <text x="135" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">上位词 / 语义类别</text>
    <text x="135" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">SRL: AllenNLP / spaCy</text>
    <text x="135" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">PropBank / API</text>

    <rect x="250" y="350" width="190" height="110" rx="10" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="345" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#283593">10. 语用学标注</text>
    <text x="345" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">言语行为 Searle</text>
    <text x="345" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">Hyland 立场</text>
    <text x="345" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">评价理论 Appraisal</text>

    <rect x="460" y="350" width="190" height="110" rx="10" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="555" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">11. 语步标注</text>
    <text x="555" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">Swales CARS</text>
    <text x="555" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">Move / Step</text>
    <text x="555" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">DeepSeek API</text>

    <rect x="670" y="350" width="190" height="110" rx="10" fill="#fff8e1" stroke="#ffc107" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="765" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f57f17">12. 设置</text>
    <text x="765" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">API Key</text>
    <text x="765" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">模型选择</text>
    <text x="765" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#424242">中英文切换</text>
  </g>
</svg>