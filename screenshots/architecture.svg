<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#fafbfc"/>

  <!-- Title -->
  <rect x="250" y="20" width="300" height="50" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="400" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">CorpusLab 架构图</text>

  <!-- Main App Box -->
  <rect x="300" y="90" width="200" height="60" rx="10" fill="#e3f2fd" stroke="#4a90e2" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">CorpusLab v0.75</text>
  <text x="400" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#546e7a">PyQt5 桌面应用</text>

  <!-- Three Layers -->
  <!-- GUI Layer -->
  <rect x="80" y="180" width="200" height="110" rx="10" fill="#fff8e1" stroke="#ffc107" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5d4037">表现层</text>
  <text x="180" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6d4c41">PyQt5 主窗口</text>
  <text x="180" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6d4c41">12 个独立页面</text>
  <text x="180" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6d4c41">QWebEngine / ECharts</text>

  <!-- Engine Layer -->
  <rect x="300" y="180" width="200" height="110" rx="10" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2e7d32">语料引擎</text>
  <text x="400" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#388e3c">分词 / 词频 / POS</text>
  <text x="400" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#388e3c">搭配 / Keyness / 索引</text>
  <text x="400" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#388e3c">jieba / NLTK / spaCy</text>

  <!-- AI/Visualization Layer -->
  <rect x="520" y="180" width="200" height="110" rx="10" fill="#f3e5f5" stroke="#ab47bc" stroke-width="2" filter="url(#shadow)"/>
  <text x="620" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6a1b9a">AI + 可视化</text>
  <text x="620" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7b1fa2">DeepSeek API</text>
  <text x="620" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7b1fa2">AllenNLP / spaCy SRL</text>
  <text x="620" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7b1fa2">ECharts 力导向图</text>

  <!-- Arrows from Main App to Layers -->
  <line x1="360" y1="150" x2="230" y2="180" stroke="#78909c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="150" x2="400" y2="180" stroke="#78909c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="150" x2="570" y2="180" stroke="#78909c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Data Sources -->
  <rect x="120" y="340" width="160" height="90" rx="10" fill="#e1f5fe" stroke="#29b6f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#01579b">输入语料</text>
  <text x="200" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0277bd">TXT / DOCX</text>
  <text x="200" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0277bd">中英文自动检测</text>

  <rect x="320" y="340" width="160" height="90" rx="10" fill="#fce4ec" stroke="#ec407a" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#880e4f">外部模型</text>
  <text x="400" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ad1457">AllenNLP 模型</text>
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ad1457">spaCy 模型</text>

  <rect x="520" y="340" width="160" height="90" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e65100">输出结果</text>
  <text x="600" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ef6c00">表格 / 图表</text>
  <text x="600" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ef6c00">导出分析数据</text>

  <!-- Arrows from Engine to Data -->
  <line x1="180" y1="290" x2="200" y2="340" stroke="#78909c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="290" x2="400" y2="340" stroke="#78909c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="620" y1="290" x2="600" y2="340" stroke="#78909c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#78909c"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#90a4ae">designed by Peki · 小清新语料库分析工具</text>
</svg>